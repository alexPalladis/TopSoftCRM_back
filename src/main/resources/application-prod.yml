spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?serverTimezone=Europe/Athens&allowPublicKeyRetrieval=true&useSSL=true
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 28800000
  webhook:
    secret: ${WEBHOOK_SECRET}